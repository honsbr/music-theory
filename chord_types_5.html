<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chord Highlighter – 3 Octave Pastel Piano</title>

<style>
:root {
    --bg:#f4f4f2;
    --white:#ffffff;
    --white-active:#cde7ff;
    --black:#222;
    --black-active:#6db3ff;

    --pastel-1:#ffd6e8;
    --pastel-2:#ffecc7;
    --pastel-3:#d7f5e9;
    --pastel-4:#d8e7ff;
    --pastel-5:#f8dfff;
    --button-bg:#ececec;
    --button-hover:#dedede;
}

body {
    background:var(--bg);
    font-family:Inter,sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:25px;
}

h2 { margin-bottom:20px; color:#444; }

/* Keyboard */
.piano-wrapper {
    width:900px;
    height:240px;
    margin-bottom:20px;
    position:relative;
}

.piano { position:relative; height:240px; }

.white {
    position:absolute;
    bottom:0;
    width:40px;
    height:240px;
    background:var(--white);
    border:1px solid #0002;
    display:flex;
    justify-content:center;
    align-items:flex-end;
    padding-bottom:5px;
    z-index:1;
}

.white.active { background:var(--white-active); }

.black {
    position:absolute;
    top:0;
    width:24px;
    height:150px;
    background:var(--black);
    border:1px solid #0002;
    border-radius:0 0 4px 4px;
    color:white;
    display:flex;
    justify-content:center;
    align-items:flex-end;
    padding-bottom:5px;
    z-index:2;
}

.black.active { background:var(--black-active); }

/* Note buttons */
.note-list {
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    width:900px;
    justify-content:center;
    margin-bottom:20px;
}

.note-button {
    background:var(--button-bg);
    padding:6px 10px;
    border-radius:6px;
    border:1px solid #ccc;
    cursor:pointer;
}

.note-button.active {
    background:var(--pastel-4);
    border-color:#999;
}

.note-button:hover { background:var(--button-hover); }

/* Chord buttons */
.chord-panel {
    width:900px;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
}

.chord-button {
    padding:8px 14px;
    background:var(--pastel-3);
    border:1px solid #ccc;
    border-radius:6px;
    cursor:pointer;
}

.chord-button:hover {
    filter:brightness(0.95);
}

</style>
</head>
<body>

<h2>🎹 Chord Highlighter – 3 Octave Piano</h2>

<!-- KEYBOARD -->
<div class="piano-wrapper">
    <div class="piano" id="piano"></div>
</div>

<!-- NOTE BUTTONS -->
<div class="note-list" id="noteList"></div>

<!-- CHORD BUTTONS -->
<div class="chord-panel">
    <div class="chord-button" data-chord="major">Major</div>
    <div class="chord-button" data-chord="minor">Minor</div>
    <div class="chord-button" data-chord="sus2">Sus2</div>
    <div class="chord-button" data-chord="sus4">Sus4</div>
    <div class="chord-button" data-chord="7">7</div>
    <div class="chord-button" data-chord="maj7">Maj7</div>
    <div class="chord-button" data-chord="min7">Min7</div>
    <div class="chord-button" data-chord="add9">Add9</div>
</div>

<script>
/* ==========================================================
   NOTE DATA (3 OCTAVES)
========================================================== */
const NAMES=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];

function midiFromName(n){
    const L=n[0],acc=n.includes("#")?1:0,oct=+n.slice(-1);
    const base={C:0,D:2,E:4,F:5,G:7,A:9,B:11}[L];
    return (oct+1)*12 + base + acc;
}

const NOTES=[];
["3","4","5"].forEach(o=>{
    NAMES.forEach(n=>{
        const full=n+o;
        NOTES.push({
            note:full,
            midi:midiFromName(full),
            freq:440 * Math.pow(2,(midiFromName(full)-69)/12)
        });
    });
});

/* ==========================================================
   AUDIO
========================================================== */
const audio=new (window.AudioContext||window.webkitAudioContext)();

function playTone(freq,delay=0){
    const osc=audio.createOscillator();
    const g=audio.createGain();
    osc.type="sine";
    osc.frequency.value=freq;
    osc.connect(g);
    g.connect(audio.destination);

    const t=audio.currentTime+delay;
    g.gain.setValueAtTime(.001,t);
    g.gain.exponentialRampToValueAtTime(.4,t+0.03);
    g.gain.exponentialRampToValueAtTime(.001,t+1);

    osc.start(t);
    osc.stop(t+1.05);
}

function playChord(indices){
    indices.forEach((i,k)=>playTone(NOTES[i].freq,k*0.04));
}

/* ==========================================================
   BUILD KEYBOARD (40px whites, B2-style blacks)
========================================================== */
const piano=document.getElementById("piano");
const keyEls=[];
let whiteIndex=0;

NOTES.forEach((n,i)=>{
    const isBlack=n.note.includes("#");
    const key=document.createElement("div");
    key.dataset.index=i;
    key.textContent=n.note;

    if(!isBlack){
        key.className="white";
        key.style.left=(whiteIndex*40)+"px";
        whiteIndex++;
    } else {
        key.className="black";
        key.style.left=(whiteIndex*40 - 12 + 6)+"px"; // forward shifted
    }

    key.onclick=()=>selectRoot(i);
    piano.appendChild(key);
    keyEls.push(key);
});

function highlight(arr){
    keyEls.forEach(k=>k.classList.remove("active"));
    arr.forEach(i=>keyEls[i]?.classList.add("active"));
}

/* ==========================================================
   NOTE BUTTONS
========================================================== */
const noteList=document.getElementById("noteList");

NOTES.forEach((n,i)=>{
    const b=document.createElement("div");
    b.className="note-button";
    b.dataset.index=i;
    b.textContent=n.note;
    b.onclick=()=>selectRoot(i);
    noteList.appendChild(b);
});

/* ==========================================================
   ROOT SELECTION
========================================================== */
let rootIndex=0;

function selectRoot(i){
    rootIndex=i;

    document.querySelectorAll(".note-button")
        .forEach(b=>b.classList.remove("active"));
    document.querySelector(`.note-button[data-index="${i}"]`).classList.add("active");

    highlight([i]);
    playTone(NOTES[i].freq);
}

/* ==========================================================
   CHORD DEFINITIONS
========================================================== */
const CHORDS={
    "major":[0,4,7],
    "minor":[0,3,7],
    "sus2":[0,2,7],
    "sus4":[0,5,7],
    "7":[0,4,7,10],
    "maj7":[0,4,7,11],
    "min7":[0,3,7,10],
    "add9":[0,4,7,14]
};

/* ==========================================================
   CHORD BUTTON LOGIC
========================================================== */
document.querySelectorAll(".chord-button").forEach(btn=>{
    btn.onclick=()=>{
        const chord=CHORDS[btn.dataset.chord];
        const arr=chord
            .map(st=>rootIndex+st)
            .filter(i=>NOTES[i]);

        highlight(arr);
        playChord(arr);
    };
});
</script>

</body>
</html>
