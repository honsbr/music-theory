<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chord Sequencer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#2c1f14;
    --surface:#3a2a1c;
    --surface2:#473522;
    --border:#5c3f28;
    --border2:#7a5438;
    --accent:#c9914a;
    --accent2:#e8b070;
    --accent-dim:rgba(201,145,74,0.12);
    --accent-glow:rgba(201,145,74,0.28);
    --text:#f5e6c8;
    --text2:#c8a97a;
    --text3:#7a6248;
    --green:#4a8c5c;
    --green-dim:rgba(74,140,92,0.15);
    --green-bright:#5dab72;
    --amber:#d4a030;
    --amber-dim:rgba(212,160,48,0.12);
    --red:#b04040;
    --red-dim:rgba(176,64,64,0.12);
    --radius:7px;
    --radius-lg:11px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
  .app{max-width:1020px;margin:0 auto;padding:2rem 1.5rem 4rem;}

  .header{display:flex;align-items:baseline;gap:1rem;margin-bottom:2rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border);}
  .logo{font-family:'Space Mono',monospace;font-size:1.3rem;font-weight:700;letter-spacing:-0.02em;color:var(--text);}
  .logo span{color:var(--accent2);}
  .subtitle{font-size:0.78rem;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;}
  .label{font-family:'Space Mono',monospace;font-size:0.63rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:0.55rem;}

  .status-bar{display:flex;gap:1.5rem;align-items:center;padding:0.55rem 1rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:1.5rem;flex-wrap:wrap;}
  .status-item{display:flex;align-items:center;gap:6px;}
  .status-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);}
  .status-dot.playing{background:var(--green-bright);box-shadow:0 0 5px var(--green-bright);animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  .status-text{font-family:'Space Mono',monospace;font-size:0.63rem;color:var(--text3);letter-spacing:0.06em;}
  .status-val{font-family:'Space Mono',monospace;font-size:0.63rem;color:var(--text2);}
  .wave-row{display:flex;gap:4px;}
  .wave-btn{font-family:'Space Mono',monospace;font-size:0.62rem;padding:3px 7px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all 0.12s;}
  .wave-btn:hover{border-color:var(--border2);color:var(--text);}
  .wave-btn.active{background:var(--accent);border-color:var(--accent);color:#1a0e06;}

  .top-controls{display:grid;grid-template-columns:auto 1fr auto;gap:1.5rem;align-items:start;margin-bottom:2rem;}
  .key-grid{display:flex;gap:4px;flex-wrap:wrap;max-width:380px;}
  .key-btn{font-family:'Space Mono',monospace;font-size:0.68rem;padding:4px 8px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text2);cursor:pointer;transition:all 0.12s;}
  .key-btn:hover{border-color:var(--border2);color:var(--text);}
  .key-btn.active{background:var(--accent);border-color:var(--accent);color:#1a0e06;}
  .transport-section{display:flex;flex-direction:column;align-items:flex-end;gap:0.75rem;}
  .transport-btns{display:flex;gap:8px;align-items:center;}
  .btn{font-family:'Space Mono',monospace;font-size:0.68rem;padding:7px 14px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface2);color:var(--text2);cursor:pointer;letter-spacing:0.05em;transition:all 0.12s;}
  .btn:hover{color:var(--text);border-color:var(--accent);background:var(--accent-dim);}
  .btn-play{background:var(--accent);border-color:var(--accent);color:#1a0e06;font-weight:700;padding:7px 20px;}
  .btn-play:hover{background:var(--accent2);border-color:var(--accent2);color:#1a0e06;}
  .btn-play.playing{background:var(--green);border-color:var(--green);color:#f0f8f0;}
  .btn-stop{color:var(--red);border-color:rgba(176,64,64,0.35);}
  .btn-stop:hover{background:var(--red-dim);border-color:var(--red);}
  .tempo-wrap{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:5px 12px;}
  .tempo-wrap .label{margin:0;}
  .tempo-display{font-family:'Space Mono',monospace;font-size:0.95rem;color:var(--accent2);min-width:36px;text-align:right;}
  .tempo-wrap input[type=range]{-webkit-appearance:none;appearance:none;width:85px;height:3px;background:var(--border2);border-radius:2px;outline:none;cursor:pointer;}
  .tempo-wrap input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--accent);cursor:pointer;}

  .sequencer-section{margin-bottom:1.75rem;}
  .seq-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.5rem;}
  .seq-add-btn{font-family:'Space Mono',monospace;font-size:0.62rem;padding:4px 11px;border-radius:var(--radius);border:1px dashed var(--border2);background:transparent;color:var(--text3);cursor:pointer;transition:all 0.12s;letter-spacing:0.05em;}
  .seq-add-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}
  .seq-pos-bar{display:flex;gap:7px;margin-bottom:8px;list-style:none;}
  .pos-dot{width:6px;height:6px;border-radius:50%;background:var(--border2);transition:background 0.1s;}
  .pos-dot.current{background:var(--green-bright);}
  .pos-dot.visited{background:var(--accent);}
  .sequencer-track{display:flex;gap:8px;align-items:stretch;overflow-x:auto;padding-bottom:8px;min-height:145px;}
  .sequencer-track::-webkit-scrollbar{height:4px;}
  .sequencer-track::-webkit-scrollbar-track{background:var(--surface);border-radius:2px;}
  .sequencer-track::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

  .step{flex:0 0 116px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:10px;display:flex;flex-direction:column;gap:5px;position:relative;cursor:grab;transition:border-color 0.12s,box-shadow 0.12s,opacity 0.12s,transform 0.1s;user-select:none;}
  .step:hover{border-color:var(--border2);}
  .step.active-step{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-glow);}
  .step.playing-step{border-color:var(--green-bright);box-shadow:0 0 0 2px rgba(93,171,114,0.3);background:rgba(93,171,114,0.06);}
  .step.rest-step{opacity:0.5;border-style:dashed;}
  .step.dragging{opacity:0.2;transform:scale(0.96);}
  .step.drag-over-left{border-left:3px solid var(--amber);}
  .step.drag-over-right{border-right:3px solid var(--amber);}
  .step-number{font-family:'Space Mono',monospace;font-size:0.53rem;color:var(--text3);letter-spacing:0.1em;}
  .step-roman{font-family:'Space Mono',monospace;font-size:1.35rem;font-weight:700;color:var(--text);line-height:1;min-height:1.35rem;}
  .step-note{font-size:0.7rem;color:var(--accent2);font-weight:500;}
  .step-inv{font-size:0.58rem;color:var(--amber);}
  .step-ext-badge{font-family:'Space Mono',monospace;font-size:0.56rem;padding:2px 5px;background:var(--amber-dim);color:var(--amber);border-radius:4px;border:1px solid rgba(212,160,48,0.22);display:inline-block;width:fit-content;}
  .step-del{position:absolute;top:6px;right:6px;width:17px;height:17px;border-radius:50%;background:var(--red-dim);border:1px solid rgba(176,64,64,0.22);color:var(--red);font-size:11px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.12s;cursor:pointer;z-index:2;}
  .step:hover .step-del{opacity:1;}
  .add-step-placeholder{flex:0 0 116px;border:1px dashed var(--border);border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);font-size:1.4rem;transition:all 0.12s;min-height:130px;}
  .add-step-placeholder:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}

  /* ── Piano — dark wood casing ── */
  .piano-section{background:#1e1208;border:2px solid #6a4220;border-radius:var(--radius-lg);padding:1.1rem;margin-bottom:1.75rem;box-shadow:inset 0 2px 8px rgba(0,0,0,0.5);}
  .piano-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.9rem;flex-wrap:wrap;gap:0.5rem;}
  .piano-info{display:flex;gap:1rem;align-items:center;flex-wrap:wrap;}
  .piano-chord-name{font-family:'Space Mono',monospace;font-size:1rem;color:var(--text);font-weight:700;}
  .piano-notes-list{font-size:0.72rem;color:var(--text2);font-family:'Space Mono',monospace;letter-spacing:0.03em;}
  .piano-inv-label{font-family:'Space Mono',monospace;font-size:0.62rem;color:var(--amber);background:var(--amber-dim);border:1px solid rgba(212,160,48,0.22);border-radius:4px;padding:2px 7px;}
  .piano-hint{font-size:0.65rem;color:var(--text3);font-style:italic;}
  .piano-wrap{overflow-x:auto;padding-bottom:5px;background:#120a02;border-radius:6px;padding:8px 8px 10px;}
  .piano-wrap::-webkit-scrollbar{height:4px;}
  .piano-wrap::-webkit-scrollbar-track{background:#1a0e06;border-radius:2px;}
  .piano-wrap::-webkit-scrollbar-thumb{background:#5c3f28;border-radius:2px;}
  .piano{position:relative;display:flex;height:134px;width:max-content;}

  /* Ivory white keys */
  .white-key{
    position:relative;width:38px;height:134px;
    background:linear-gradient(to bottom,#f0e8d4 0%,#e0d0b0 100%);
    border:1px solid #a8885a;
    border-radius:0 0 6px 6px;
    flex-shrink:0;
    transition:background 0.08s;
    display:flex;align-items:flex-end;justify-content:center;
    padding-bottom:7px;z-index:1;cursor:pointer;
    box-shadow:inset -1px 0 0 rgba(255,255,255,0.3),inset 0 -3px 5px rgba(0,0,0,0.12),1px 0 0 rgba(0,0,0,0.15);
  }
  .white-key:hover{background:linear-gradient(to bottom,#f8f0dc 0%,#e8d8bc 100%);}
  .white-key.lit{background:linear-gradient(to bottom,#f0d878 0%,#c8a030 100%);border-color:#9a7820;}
  .white-key.root{background:linear-gradient(to bottom,#d4903c 0%,#8c5a18 100%);border-color:#6a3e10;}
  .white-key.flash{background:linear-gradient(to bottom,#80cc90 0%,#4a9060 100%) !important;border-color:#387848 !important;transition:none;}
  .white-key.pressed{background:linear-gradient(to bottom,#dcc880 0%,#b09040 100%) !important;border-color:#8a6e28 !important;transition:none;}
  .key-label{font-family:'Space Mono',monospace;font-size:0.53rem;color:rgba(80,50,18,0.5);text-align:center;pointer-events:none;line-height:1.2;}
  .white-key.lit .key-label,.white-key.root .key-label{color:rgba(255,240,190,0.92);}
  .white-key.flash .key-label{color:rgba(10,50,20,0.55) !important;}
  .white-key.pressed .key-label{color:rgba(60,40,10,0.55) !important;}

  /* Deep walnut black keys */
  .black-key{
    position:absolute;width:24px;height:84px;
    background:linear-gradient(to bottom,#1e1208 0%,#0e0804 100%);
    border:1px solid #3a2010;
    border-radius:0 0 5px 5px;z-index:2;top:0;
    transition:background 0.08s;
    display:flex;align-items:flex-end;justify-content:center;
    padding-bottom:5px;cursor:pointer;
    box-shadow:2px 3px 6px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.08);
  }
  .black-key:hover{background:linear-gradient(to bottom,#2e1c0c 0%,#180e06 100%);}
  .black-key.lit{background:linear-gradient(to bottom,#c89040 0%,#7a5418 100%);border-color:#9a6e28;}
  .black-key.root{background:linear-gradient(to bottom,#e8a850 0%,#9a6020 100%);border-color:#b87830;}
  .black-key.flash{background:linear-gradient(to bottom,#60b878 0%,#2e7040 100%) !important;border-color:#3a7848 !important;transition:none;}
  .black-key.pressed{background:linear-gradient(to bottom,#a88038 0%,#705018 100%) !important;border-color:#806020 !important;transition:none;}
  .black-key .key-label{color:rgba(200,158,90,0.38);font-size:0.48rem;}
  .black-key.lit .key-label,.black-key.root .key-label{color:rgba(255,228,170,0.9);}

  /* Editor */
  .editor-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.1rem;margin-bottom:2rem;}
  .editor-title{font-family:'Space Mono',monospace;font-size:0.67rem;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.9rem;display:flex;align-items:center;gap:8px;}
  .step-indicator{background:var(--accent-dim);color:var(--accent2);border:1px solid rgba(201,145,74,0.3);border-radius:4px;padding:2px 7px;font-size:0.62rem;}
  .editor-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;}
  .chord-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .chord-btn{font-family:'Space Mono',monospace;font-size:0.66rem;padding:7px 3px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--text2);cursor:pointer;text-align:center;transition:all 0.12s;display:flex;flex-direction:column;align-items:center;gap:3px;}
  .chord-btn:hover{border-color:var(--border2);color:var(--text);}
  .chord-btn.active{background:var(--accent);border-color:var(--accent);color:#1a0e06;}
  .chord-btn .note{font-size:0.52rem;color:var(--text3);font-family:'DM Sans',sans-serif;}
  .chord-btn.active .note{color:rgba(26,14,6,0.65);}
  .ext-grid{display:flex;flex-wrap:wrap;gap:5px;}
  .ext-btn{font-family:'Space Mono',monospace;font-size:0.6rem;padding:4px 8px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all 0.12s;}
  .ext-btn:hover{border-color:var(--border2);color:var(--text);}
  .ext-btn.active{background:var(--amber-dim);border-color:var(--amber);color:var(--amber);}
  .inv-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:0.7rem;}
  .inv-btn{font-family:'Space Mono',monospace;font-size:0.6rem;padding:4px 9px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all 0.12s;}
  .inv-btn:hover{border-color:var(--border2);color:var(--text);}
  .inv-btn.active{background:var(--green-dim);border-color:var(--green);color:var(--green-bright);}
  .rest-toggle{display:flex;align-items:center;gap:8px;margin-top:0.7rem;}
  .rest-toggle input[type=checkbox]{width:15px;height:15px;accent-color:var(--accent);cursor:pointer;}
  .rest-toggle label{font-size:0.78rem;color:var(--text2);cursor:pointer;}
  .octave-control{display:flex;align-items:center;gap:8px;margin-top:0.7rem;}
  .octave-control .label{margin:0;}
  .octave-btn{width:24px;height:24px;border-radius:50%;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);cursor:pointer;font-size:0.95rem;display:flex;align-items:center;justify-content:center;transition:all 0.12s;}
  .octave-btn:hover{border-color:var(--accent);color:var(--accent);}
  .octave-val{font-family:'Space Mono',monospace;font-size:0.78rem;color:var(--text);min-width:18px;text-align:center;}
  .step-duration-row{display:flex;gap:4px;margin-top:0.7rem;}
  .dur-btn{font-family:'Space Mono',monospace;font-size:0.58rem;padding:4px 7px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all 0.12s;}
  .dur-btn:hover{border-color:var(--border2);color:var(--text);}
  .dur-btn.active{background:var(--green-dim);border-color:var(--green);color:var(--green-bright);}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="logo">chord<span>seq</span></div>
    <div class="subtitle">Piano Chord Sequencer</div>
  </div>

  <div class="status-bar">
    <div class="status-item"><div class="status-dot" id="statusDot"></div><span class="status-text" id="statusText">STOPPED</span></div>
    <div class="status-item"><span class="status-text">KEY</span><span class="status-val" id="statusKey">C</span></div>
    <div class="status-item"><span class="status-text">STEP</span><span class="status-val" id="statusStep">—</span></div>
    <div class="status-item"><span class="status-text">CHORD</span><span class="status-val" id="statusChord">—</span></div>
    <div class="status-item" style="margin-left:auto;">
      <span class="status-text">SOUND</span>
      <div class="wave-row">
        <button class="wave-btn active" data-wave="piano">PIANO</button>
        <button class="wave-btn" data-wave="triangle">TRI</button>
        <button class="wave-btn" data-wave="sine">SINE</button>
        <button class="wave-btn" data-wave="sawtooth">SAW</button>
      </div>
    </div>
  </div>

  <div class="top-controls">
    <div><div class="label">Root Key</div><div class="key-grid" id="keyGrid"></div></div>
    <div></div>
    <div class="transport-section">
      <div class="tempo-wrap">
        <span class="label">BPM</span>
        <input type="range" id="tempoSlider" min="40" max="160" value="80" step="1">
        <span class="tempo-display" id="tempoDisplay">80</span>
      </div>
      <div class="transport-btns">
        <button class="btn btn-stop" id="stopBtn">&#9632; STOP</button>
        <button class="btn btn-play" id="playBtn">&#9654; PLAY</button>
      </div>
    </div>
  </div>

  <div class="sequencer-section">
    <div class="seq-header">
      <div class="label">Sequence — drag to reorder</div>
      <button class="seq-add-btn" id="addStepBtn">+ ADD STEP</button>
    </div>
    <ul class="seq-pos-bar" id="posDots"></ul>
    <div class="sequencer-track" id="sequencerTrack"></div>
  </div>

  <div class="piano-section">
    <div class="piano-header">
      <div class="label" style="margin:0;color:var(--text2);">Keyboard</div>
      <div class="piano-info">
        <span class="piano-chord-name" id="pianoChordName">—</span>
        <span class="piano-notes-list" id="pianoNotesList"></span>
        <span class="piano-inv-label" id="pianoInvLabel" style="display:none;"></span>
      </div>
      <span class="piano-hint">click any key to hear it</span>
    </div>
    <div class="piano-wrap"><div class="piano" id="piano"></div></div>
  </div>

  <div class="editor-panel">
    <div class="editor-title">STEP EDITOR <span class="step-indicator" id="stepIndicator">Select a step</span></div>
    <div class="editor-grid">
      <div>
        <div class="label">Scale Degree</div>
        <div class="chord-grid" id="chordGrid"></div>
        <div class="rest-toggle">
          <input type="checkbox" id="restToggle">
          <label for="restToggle">Rest (silence)</label>
        </div>
        <div class="octave-control">
          <span class="label">OCTAVE</span>
          <button class="octave-btn" id="octaveDown">−</button>
          <span class="octave-val" id="octaveVal">4</span>
          <button class="octave-btn" id="octaveUp">+</button>
        </div>
      </div>
      <div>
        <div class="label">Quality &amp; Extensions</div>
        <div class="ext-grid" id="extGrid"></div>
        <div style="margin-top:0.8rem;">
          <div class="label">Inversion</div>
          <div class="inv-row" id="invRow"></div>
        </div>
        <div style="margin-top:0.8rem;">
          <div class="label">Beats per chord</div>
          <div class="step-duration-row">
            <button class="dur-btn" data-dur="1">1</button>
            <button class="dur-btn active" data-dur="2">2</button>
            <button class="dur-btn" data-dur="3">3</button>
            <button class="dur-btn" data-dur="4">4</button>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>
<script>
const KEYS=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const DISP=['C','C#','D','Eb','E','F','F#','G','Ab','A','Bb','B'];
const NUMS=['I','II','III','IV','V','VI','VII'];
const SCALE=[0,2,4,5,7,9,11];
const DEF_Q=['','m','m','','','m','dim'];
const EXTS=[
  {l:'Maj',v:''},{l:'min',v:'m'},{l:'7',v:'7'},{l:'maj7',v:'maj7'},{l:'m7',v:'m7'},
  {l:'9',v:'9'},{l:'maj9',v:'maj9'},{l:'m9',v:'m9'},{l:'sus2',v:'sus2'},{l:'sus4',v:'sus4'},
  {l:'add9',v:'add9'},{l:'dim',v:'dim'},{l:'dim7',v:'dim7'},{l:'aug',v:'aug'},{l:'6',v:'6'},{l:'m6',v:'m6'},
];
const IVALS={
  '':   [0,4,7],'m':  [0,3,7],'7':  [0,4,7,10],'maj7':[0,4,7,11],
  'm7': [0,3,7,10],'9': [0,4,7,10,14],'maj9':[0,4,7,11,14],'m9':[0,3,7,10,14],
  'sus2':[0,2,7],'sus4':[0,5,7],'add9':[0,4,7,14],'dim':[0,3,6],
  'dim7':[0,3,6,9],'aug':[0,4,8],'6':[0,4,7,9],'m6':[0,3,7,9],
};
const WHITE_S=[0,2,4,5,7,9,11];
const BLACK_S=[1,3,6,8,10];
const KEY_W=38,P_OCT=3,P_NOCTS=3;

let selKey=0,selStep=null,playing=false,stepIdx=-1,playTmr=null;
let audioCtx=null,wave='piano',steps=[],dragIdx=null;

function mkStep(){return{id:Date.now()+Math.random(),degree:0,ext:'',isRest:false,octave:4,duration:2,inversion:0};}
const startDegrees=[0,3,4,0];
for(let i=0;i<4;i++){const s=mkStep();s.degree=startDegrees[i];steps.push(s);}

function getCtx(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function m2f(m){return 440*Math.pow(2,(m-69)/12);}

function playNote(freq,duration,gainLevel){
  const c=getCtx(),now=c.currentTime;
  const master=c.createGain();
  master.connect(c.destination);
  const harmonics=[1,2,3,4,5,6,7,8];
  const amps=[1,.45,.2,.1,.05,.025,.012,.006];
  harmonics.forEach((h,i)=>{
    const o=c.createOscillator(),g=c.createGain();
    o.type='sine';
    o.frequency.value=freq*h;
    const pk=gainLevel*amps[i];
    g.gain.setValueAtTime(pk,now);
    g.gain.exponentialRampToValueAtTime(pk*0.5,now+0.05);
    g.gain.exponentialRampToValueAtTime(pk*0.18,now+0.3);
    g.gain.exponentialRampToValueAtTime(0.0001,now+Math.max(duration*0.98,0.5));
    o.connect(g);g.connect(master);
    o.start(now);o.stop(now+Math.max(duration,0.5)+0.05);
  });
}

function playSingleMidi(midi,duration){
  if(wave==='piano'){playNote(m2f(midi),duration,0.22);}
  else{
    const c=getCtx(),now=c.currentTime;
    const o=c.createOscillator(),g=c.createGain();
    o.type=wave;o.frequency.value=m2f(midi);
    g.gain.setValueAtTime(0,now);
    g.gain.linearRampToValueAtTime(0.18,now+0.015);
    g.gain.setValueAtTime(0.18,now+duration*0.8);
    g.gain.exponentialRampToValueAtTime(0.0001,now+duration*0.99);
    o.connect(g);g.connect(c.destination);o.start(now);o.stop(now+duration+0.05);
  }
}

function playChord(step){
  if(step.isRest)return;
  const bpm=parseInt(document.getElementById('tempoSlider').value);
  const duration=(60/bpm)*step.duration;
  const notes=chordMidi(step);
  const perGain=wave==='piano'?(0.22/Math.sqrt(notes.length)):0;
  notes.forEach(m=>{
    if(wave==='piano')playNote(m2f(m),duration,perGain);
    else playSingleMidi(m,duration);
  });
}

function playKeyNote(midi){getCtx();playSingleMidi(midi,1.2);}

function chordMidi(step){
  if(step.isRest)return[];
  const ivs=IVALS[step.ext]||[0,4,7];
  const root=(selKey+SCALE[step.degree])%12;
  const base=12*step.octave+root;
  let ns=ivs.map(v=>base+v);
  const inv=Math.min(step.inversion||0,ns.length-1);
  for(let i=0;i<inv;i++)ns[i]+=12;
  return ns.sort((a,b)=>a-b);
}
function roman(deg,ext){
  let r=NUMS[deg];const dq=DEF_Q[deg];
  let min=ext==='m'||ext==='m7'||ext==='m9'||ext==='m6';
  if(ext===''&&(dq==='m'||dq==='dim'))min=true;
  if(min)r=r.toLowerCase();
  if(ext==='dim'||ext==='dim7'||(ext===''&&dq==='dim'))r=r.toLowerCase()+'°';
  if(ext==='aug')r=r+'+';
  const s={'7':'⁷','maj7':'Δ⁷','m7':'⁷','9':'⁹','maj9':'Δ⁹','m9':'⁹','sus2':'ˢ²','sus4':'ˢ⁴','add9':'⁺⁹','6':'⁶','m6':'⁶','dim7':'°⁷'};
  if(s[ext])r+=s[ext];return r;
}
function chordName(deg,ext){return KEYS[(selKey+SCALE[deg])%12]+(ext||DEF_Q[deg]);}
function noteName(m){return KEYS[m%12]+Math.floor(m/12-1);}
function invLabel(i){return['Root','1st','2nd','3rd','4th'][i]||(i+'th');}
function stepMs(step){return(60000/parseInt(document.getElementById('tempoSlider').value))*step.duration;}

function buildPiano(){
  const p=document.getElementById('piano');p.innerHTML='';
  p.style.width=(P_NOCTS*7*KEY_W)+'px';
  for(let o=0;o<P_NOCTS;o++){
    WHITE_S.forEach(s=>{
      const midi=(P_OCT+o)*12+s;
      const k=document.createElement('div');
      k.className='white-key';k.dataset.midi=midi;
      const lbl=document.createElement('div');lbl.className='key-label';
      lbl.innerHTML=KEYS[s]+(s===0?'<br>'+(P_OCT+o):'');
      k.appendChild(lbl);
      k.addEventListener('mousedown',e=>{e.stopPropagation();handleKeyPress(k,midi);});
      k.addEventListener('touchstart',e=>{e.preventDefault();e.stopPropagation();handleKeyPress(k,midi);},{passive:false});
      p.appendChild(k);
    });
  }
  for(let o=0;o<P_NOCTS;o++){
    BLACK_S.forEach(s=>{
      const wb=WHITE_S.filter(w=>w<s).length+o*7;
      const midi=(P_OCT+o)*12+s;
      const k=document.createElement('div');
      k.className='black-key';k.dataset.midi=midi;
      k.style.left=(wb*KEY_W-12)+'px';
      const lbl=document.createElement('div');lbl.className='key-label';lbl.textContent=KEYS[s];
      k.appendChild(lbl);
      k.addEventListener('mousedown',e=>{e.stopPropagation();handleKeyPress(k,midi);});
      k.addEventListener('touchstart',e=>{e.preventDefault();e.stopPropagation();handleKeyPress(k,midi);},{passive:false});
      p.appendChild(k);
    });
  }
}

function handleKeyPress(keyEl,midi){
  getCtx();playKeyNote(midi);
  keyEl.classList.add('pressed');
  setTimeout(()=>keyEl.classList.remove('pressed'),220);
}

function litPiano(step,flash=false){
  document.querySelectorAll('.white-key,.black-key').forEach(k=>k.classList.remove('lit','root','flash'));
  const cn=document.getElementById('pianoChordName');
  const nl=document.getElementById('pianoNotesList');
  const il=document.getElementById('pianoInvLabel');
  if(!step||step.isRest){cn.textContent='—';nl.textContent='';il.style.display='none';return;}
  const notes=chordMidi(step);
  cn.textContent=chordName(step.degree,step.ext);
  nl.textContent=notes.map(noteName).join('  ·  ');
  const inv=step.inversion||0;
  if(inv>0){il.textContent=invLabel(inv)+' inversion';il.style.display='';}
  else il.style.display='none';
  notes.forEach((m,i)=>{
    const k=document.querySelector(`[data-midi="${m}"]`);
    if(!k)return;
    k.classList.add(flash?'flash':i===0?'root':'lit');
  });
  if(flash){
    setTimeout(()=>{
      document.querySelectorAll('.flash').forEach(k=>k.classList.remove('flash'));
      if(selStep&&!playing)litPiano(selStep);
    },300);
  }
  if(notes.length){
    const minM=Math.min(...notes);
    const oct=Math.floor(minM/12)-P_OCT;
    document.querySelector('.piano-wrap').scrollLeft=Math.max(0,oct*7*KEY_W-20);
  }
}

function renderKeys(){
  const g=document.getElementById('keyGrid');g.innerHTML='';
  DISP.forEach((k,i)=>{
    const b=document.createElement('button');b.className='key-btn'+(i===selKey?' active':'');
    b.textContent=k;b.onclick=()=>{selKey=i;renderAll();};g.appendChild(b);
  });
  document.getElementById('statusKey').textContent=DISP[selKey];
}

function renderSeq(){
  const track=document.getElementById('sequencerTrack');track.innerHTML='';
  steps.forEach((step,idx)=>{
    const el=document.createElement('div');
    el.className='step'+(step===selStep?' active-step':'')+(idx===stepIdx?' playing-step':'')+(step.isRest?' rest-step':'');
    el.draggable=true;el.dataset.idx=idx;
    const num=document.createElement('div');num.className='step-number';num.textContent=`STEP ${idx+1}`;
    const rv=document.createElement('div');rv.className='step-roman';rv.textContent=step.isRest?'—':roman(step.degree,step.ext);
    const nv=document.createElement('div');nv.className='step-note';nv.textContent=step.isRest?'rest':chordName(step.degree,step.ext);
    el.appendChild(num);el.appendChild(rv);el.appendChild(nv);
    if(step.ext&&!step.isRest){const b=document.createElement('div');b.className='step-ext-badge';b.textContent=step.ext;el.appendChild(b);}
    if((step.inversion||0)>0&&!step.isRest){const iv=document.createElement('div');iv.className='step-inv';iv.textContent=invLabel(step.inversion)+' inv';el.appendChild(iv);}
    const dots=document.createElement('div');dots.style.cssText='display:flex;gap:3px;margin-top:3px;';
    for(let d=0;d<step.duration;d++){const dot=document.createElement('div');dot.style.cssText='width:5px;height:5px;border-radius:50%;background:var(--border2);';dots.appendChild(dot);}
    el.appendChild(dots);
    const del=document.createElement('button');del.className='step-del';del.textContent='×';
    del.onclick=e=>{e.stopPropagation();if(step===selStep)selStep=null;steps.splice(idx,1);renderAll();};
    el.appendChild(del);
    el.onclick=()=>{selStep=step;renderAll();playChord(step);litPiano(step);};
    el.addEventListener('dragstart',e=>{dragIdx=idx;setTimeout(()=>el.classList.add('dragging'),0);e.dataTransfer.effectAllowed='move';});
    el.addEventListener('dragend',()=>{el.classList.remove('dragging');document.querySelectorAll('.step').forEach(s=>s.classList.remove('drag-over-left','drag-over-right'));});
    el.addEventListener('dragover',e=>{
      e.preventDefault();e.dataTransfer.dropEffect='move';
      document.querySelectorAll('.step').forEach(s=>s.classList.remove('drag-over-left','drag-over-right'));
      const rect=el.getBoundingClientRect();
      el.classList.add(e.clientX<rect.left+rect.width/2?'drag-over-left':'drag-over-right');
    });
    el.addEventListener('dragleave',()=>el.classList.remove('drag-over-left','drag-over-right'));
    el.addEventListener('drop',e=>{
      e.preventDefault();el.classList.remove('drag-over-left','drag-over-right');
      if(dragIdx===null||dragIdx===idx)return;
      const insertBefore=e.clientX<el.getBoundingClientRect().left+el.getBoundingClientRect().width/2;
      const moved=steps.splice(dragIdx,1)[0];
      let ti=parseInt(el.dataset.idx);if(dragIdx<ti)ti--;
      steps.splice(insertBefore?ti:ti+1,0,moved);
      dragIdx=null;renderAll();
    });
    track.appendChild(el);
  });
  const ph=document.createElement('div');ph.className='add-step-placeholder';ph.innerHTML='+';ph.onclick=addStep;track.appendChild(ph);
  const db=document.getElementById('posDots');db.innerHTML='';
  steps.forEach((_,i)=>{const d=document.createElement('li');d.className='pos-dot'+(i===stepIdx?' current':i<stepIdx?' visited':'');db.appendChild(d);});
}

function renderEditor(){
  const si=document.getElementById('stepIndicator');
  if(!selStep){si.textContent='Select a step to edit';return;}
  si.textContent=`Step ${steps.indexOf(selStep)+1}`;
  const cg=document.getElementById('chordGrid');cg.innerHTML='';
  NUMS.forEach((_,i)=>{
    const b=document.createElement('button');b.className='chord-btn'+(i===selStep.degree&&!selStep.isRest?' active':'');
    const rv=document.createElement('div');rv.textContent=roman(i,selStep.ext);
    const nv=document.createElement('div');nv.className='note';nv.textContent=KEYS[(selKey+SCALE[i])%12];
    b.appendChild(rv);b.appendChild(nv);
    b.onclick=()=>{selStep.degree=i;selStep.isRest=false;selStep.inversion=0;document.getElementById('restToggle').checked=false;renderAll();playChord(selStep);litPiano(selStep);};
    cg.appendChild(b);
  });
  document.getElementById('restToggle').checked=selStep.isRest;
  document.getElementById('octaveVal').textContent=selStep.octave;
  const eg=document.getElementById('extGrid');eg.innerHTML='';
  EXTS.forEach(e=>{
    const b=document.createElement('button');b.className='ext-btn'+(e.v===selStep.ext?' active':'');
    b.textContent=e.l;
    b.onclick=()=>{selStep.ext=e.v;selStep.inversion=0;renderAll();playChord(selStep);litPiano(selStep);};
    eg.appendChild(b);
  });
  const ir=document.getElementById('invRow');ir.innerHTML='';
  const ivs=IVALS[selStep.ext]||[0,4,7];
  for(let i=0;i<=ivs.length-1;i++){
    const b=document.createElement('button');b.className='inv-btn'+((selStep.inversion||0)===i?' active':'');
    b.textContent=invLabel(i);
    b.onclick=()=>{selStep.inversion=i;renderAll();playChord(selStep);litPiano(selStep);};
    ir.appendChild(b);
  }
  document.querySelectorAll('.dur-btn').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.dur)===selStep.duration));
  litPiano(selStep);
}

function renderAll(){renderKeys();renderSeq();renderEditor();}

function addStep(){const s=mkStep();steps.push(s);selStep=s;renderAll();}
document.getElementById('addStepBtn').onclick=addStep;
document.getElementById('restToggle').onchange=function(){if(!selStep)return;selStep.isRest=this.checked;renderAll();};
document.getElementById('octaveDown').onclick=()=>{if(!selStep||selStep.octave<=2)return;selStep.octave--;renderAll();litPiano(selStep);};
document.getElementById('octaveUp').onclick=()=>{if(!selStep||selStep.octave>=7)return;selStep.octave++;renderAll();litPiano(selStep);};
document.querySelectorAll('.dur-btn').forEach(b=>b.onclick=()=>{if(!selStep)return;selStep.duration=parseInt(b.dataset.dur);renderAll();});
document.querySelectorAll('.wave-btn').forEach(b=>b.onclick=()=>{wave=b.dataset.wave;document.querySelectorAll('.wave-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');});
document.getElementById('tempoSlider').oninput=function(){document.getElementById('tempoDisplay').textContent=this.value;};

function startPlay(){
  if(!steps.length)return;
  getCtx();playing=true;
  document.getElementById('playBtn').classList.add('playing');
  document.getElementById('playBtn').innerHTML='&#9646;&#9646; PAUSE';
  document.getElementById('statusDot').classList.add('playing');
  document.getElementById('statusText').textContent='PLAYING';
  if(stepIdx<0)stepIdx=0;
  tick();
}
function tick(){
  if(!playing||!steps.length)return;
  const step=steps[stepIdx];
  playChord(step);litPiano(step,true);
  document.getElementById('statusStep').textContent=(stepIdx+1)+'/'+steps.length;
  document.getElementById('statusChord').textContent=step.isRest?'—':chordName(step.degree,step.ext);
  renderSeq();
  playTmr=setTimeout(()=>{stepIdx=(stepIdx+1)%steps.length;tick();},stepMs(step));
}
function pausePlay(){
  playing=false;clearTimeout(playTmr);
  document.getElementById('playBtn').classList.remove('playing');document.getElementById('playBtn').innerHTML='&#9654; PLAY';
  document.getElementById('statusDot').classList.remove('playing');document.getElementById('statusText').textContent='PAUSED';
}
function stopPlay(){
  playing=false;clearTimeout(playTmr);stepIdx=-1;
  document.getElementById('playBtn').classList.remove('playing');document.getElementById('playBtn').innerHTML='&#9654; PLAY';
  document.getElementById('statusDot').classList.remove('playing');document.getElementById('statusText').textContent='STOPPED';
  document.getElementById('statusStep').textContent='—';document.getElementById('statusChord').textContent='—';
  renderSeq();if(selStep)litPiano(selStep);else litPiano(null);
}
document.getElementById('playBtn').onclick=()=>{if(playing)pausePlay();else startPlay();};
document.getElementById('stopBtn').onclick=stopPlay;

buildPiano();selStep=steps[0];renderAll();
</script>
</body>
</html>
