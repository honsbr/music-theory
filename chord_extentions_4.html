<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chord Trainer – Clean Version</title>

<style>
:root {
    --bg:#f4f4f2;
    --white:#ffffff;
    --white-active:#cde7ff;
    --black:#222;
    --black-active:#6db3ff;
    --button-bg:#ececec;
    --button-hover:#dedede;
    --pastel-3:#d7f5e9;
    --pastel-4:#d8e7ff;
}

body {
    background:var(--bg);
    font-family:Inter,sans-serif;
    padding:25px;
    display:flex;
    flex-direction:column;
    align-items:center;
}

h2 { color:#444; margin-bottom:25px; }

/* ===== KEYBOARD ===== */
.piano-wrapper {
    width:900px;
    height:240px;
    position:relative;
    margin-bottom:25px;
}
.piano { position:relative; height:240px; }

.white {
    position:absolute; bottom:0;
    width:40px; height:240px;
    background:var(--white);
    border:1px solid #0002;
    display:flex; justify-content:center; align-items:flex-end;
    padding-bottom:5px; z-index:1;
}
.white.active { background:var(--white-active); }

.black {
    position:absolute; top:0;
    width:24px; height:150px;
    background:var(--black);
    border:1px solid #0002;
    border-radius:0 0 4px 4px;
    color:white;
    display:flex; justify-content:center; align-items:flex-end;
    padding-bottom:5px; z-index:2;
}
.black.active { background:var(--black-active); }

/* ===== NOTE BUTTONS ===== */
.note-list {
    width:900px;
    display:flex; flex-wrap:wrap;
    justify-content:center; gap:7px;
    margin-bottom:25px;
}
.note-button {
    padding:6px 11px;
    background:var(--button-bg);
    border:1px solid #ccc; border-radius:6px;
    cursor:pointer;
}
.note-button:hover { background:var(--button-hover); }
.note-button.active {
    background:var(--pastel-4);
    border-color:#999;
}

/* ===== CHORD BUTTONS ===== */
.group-title {
    width:900px; color:#666;
    font-weight:600; margin:20px 0 8px;
}
.chord-panel {
    width:900px; display:flex;
    flex-wrap:wrap; gap:10px;
    justify-content:center; margin-bottom:15px;
}
.chord-button {
    padding:8px 14px;
    background:var(--pastel-3);
    border:1px solid #ccc; border-radius:6px;
    cursor:pointer;
}
.chord-button:hover { filter:brightness(.95); }
</style>
</head>

<body>

<h2>🎹 Clean Chord Trainer</h2>

<!-- KEYBOARD -->
<div class="piano-wrapper">
    <div class="piano" id="piano"></div>
</div>

<!-- NOTE BUTTONS -->
<div class="note-list" id="noteList"></div>

<!-- CHORD GROUPS -->
<div class="group-title">Primary Chords</div>
<div class="chord-panel">
    <div class="chord-button" data-chord="major">Major</div>
    <div class="chord-button" data-chord="minor">Minor</div>
    <div class="chord-button" data-chord="sus2">Sus2</div>
    <div class="chord-button" data-chord="sus4">Sus4</div>
</div>

<div class="group-title">Sevenths</div>
<div class="chord-panel">
    <div class="chord-button" data-chord="7">7</div>
    <div class="chord-button" data-chord="maj7">Maj7</div>
    <div class="chord-button" data-chord="min7">Min7</div>
</div>

<div class="group-title">Add Chords</div>
<div class="chord-panel">
    <div class="chord-button" data-chord="add9">Add9</div>
    <div class="chord-button" data-chord="6">6</div>
    <div class="chord-button" data-chord="maj6">Maj6</div>
    <div class="chord-button" data-chord="min6">Min6</div>
</div>

<div class="group-title">Extensions</div>
<div class="chord-panel">
    <div class="chord-button" data-chord="9">9</div>
    <div class="chord-button" data-chord="m9">m9</div>
    <div class="chord-button" data-chord="maj9">Maj9</div>
    <div class="chord-button" data-chord="11">11</div>
    <div class="chord-button" data-chord="sharp11">#11</div>
    <div class="chord-button" data-chord="13">13</div>
    <div class="chord-button" data-chord="b13">b13</div>
</div>

<div class="group-title">Altered Dominants</div>
<div class="chord-panel">
    <div class="chord-button" data-chord="7b9">7b9</div>
    <div class="chord-button" data-chord="7#9">7#9</div>
    <div class="chord-button" data-chord="7b5">7b5</div>
    <div class="chord-button" data-chord="7#5">7#5</div>
    <div class="chord-button" data-chord="7alt">7alt</div>
</div>

<script>
/* ==========================================================
   NOTES
========================================================== */
const NAMES=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
function midiFromName(n){
    const L=n[0],acc=n.includes("#")?1:0,oct=+n.slice(-1);
    const base={C:0,D:2,E:4,F:5,G:7,A:9,B:11}[L];
    return (oct+1)*12+base+acc;
}
const NOTES=[];
["3","4","5"].forEach(o=>{
    NAMES.forEach(n=>{
        const full=n+o;
        NOTES.push({
            note:full,
            freq:440*Math.pow(2,(midiFromName(full)-69)/12)
        });
    });
});

/* ==========================================================
   AUDIO
========================================================== */
const audio=new (window.AudioContext||window.webkitAudioContext)();
function playTone(freq,d=0){
    const osc=audio.createOscillator(),g=audio.createGain();
    osc.type="sine"; osc.frequency.value=freq;
    osc.connect(g); g.connect(audio.destination);
    const t=audio.currentTime+d;
    g.gain.setValueAtTime(.001,t);
    g.gain.exponentialRampToValueAtTime(.4,t+.03);
    g.gain.exponentialRampToValueAtTime(.001,t+1);
    osc.start(t); osc.stop(t+1.05);
}
function playChord(indices){
    indices.forEach((i,k)=>playTone(NOTES[i].freq,k*0.04));
}

/* ==========================================================
   KEYBOARD BUILD
========================================================== */
const piano=document.getElementById("piano");
const keyEls=[];
let wi=0;

NOTES.forEach((n,i)=>{
    const isBlack=n.note.includes("#");
    const el=document.createElement("div");
    el.dataset.index=i; el.textContent=n.note;

    if(!isBlack){
        el.className="white";
        el.style.left=(wi*40)+"px";
        wi++;
    } else {
        el.className="black";
        el.style.left=(wi*40 - 12 + 6)+"px";
    }

    el.onclick=()=>selectRoot(i);
    piano.appendChild(el);
    keyEls.push(el);
});

function highlight(indices){
    keyEls.forEach(k=>k.classList.remove("active"));
    indices.forEach(i=>keyEls[i]?.classList.add("active"));
}

/* ==========================================================
   NOTE BUTTONS
========================================================== */
const noteList=document.getElementById("noteList");
NOTES.forEach((n,i)=>{
    const b=document.createElement("div");
    b.className="note-button";
    b.textContent=n.note;
    b.dataset.index=i;
    b.onclick=()=>selectRoot(i);
    noteList.appendChild(b);
});

/* ==========================================================
   CHORD FORMULAS
========================================================== */
const CHORDS={
    major:[0,4,7], minor:[0,3,7],
    sus2:[0,2,7], sus4:[0,5,7],
    "7":[0,4,7,10], maj7:[0,4,7,11], min7:[0,3,7,10],
    add9:[0,4,7,14], "6":[0,4,7,9], maj6:[0,4,7,9], min6:[0,3,7,9],
    "9":[0,4,7,10,14], m9:[0,3,7,10,14], maj9:[0,4,7,11,14],
    "11":[0,4,7,10,14,17], sharp11:[0,4,7,10,18],
    "13":[0,4,7,10,14,17,21], b13:[0,4,7,10,14,17,20],
    "7b9":[0,4,7,10,13], "7#9":[0,4,7,10,15],
    "7b5":[0,4,6,10], "7#5":[0,4,8,10],
    "7alt":[0,4,7,10,13,15]
};

/* ==========================================================
   SELECT ROOT + PLAY CHORD
========================================================== */
let rootIndex=0;

function selectRoot(i){
    rootIndex=i;

    document.querySelectorAll(".note-button").forEach(b=>b.classList.remove("active"));
    document.querySelector(`.note-button[data-index="${i}"]`).classList.add("active");

    highlight([i]);
    playTone(NOTES[i].freq);
}

/* ==========================================================
   CHORD BUTTON ACTIONS
========================================================== */
document.querySelectorAll(".chord-button[data-chord]").forEach(btn=>{
    btn.onclick=()=>{
        const type=btn.dataset.chord;
        const steps=CHORDS[type];
        const indices=steps.map(st=>rootIndex+st).filter(i=>NOTES[i]);

        highlight(indices);
        playChord(indices);
    };
});
</script>

</body>
</html>
